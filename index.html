<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHYA' 7 TV - Media Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body { background-color: #020617; color: #f1f5f9; overflow-x: hidden; }
        .shape-1 { position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, rgba(2, 6, 23, 0) 70%); border-radius: 50%; z-index: -1; animation: float 15s infinite alternate; }
        .shape-2 { position: fixed; bottom: -10%; right: -10%; width: 45vw; height: 45vw; background: radial-gradient(circle, rgba(129, 140, 248, 0.15) 0%, rgba(2, 6, 23, 0) 70%); border-radius: 50%; z-index: -1; animation: float 12s infinite alternate-reverse; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); opacity: 0.5; } 100% { transform: translate(10%, 10%) scale(1.2); opacity: 0.8; } }
        .live-label { font-size: 14px; font-weight: 900; letter-spacing: 0.3em; color: #fff; text-shadow: 0 0 10px #38bdf8; animation: pulse-neon 1.5s infinite; }
        @keyframes pulse-neon { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        #sidebar { position: fixed; top: 0; left: -100%; width: 70%; height: 100%; background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(25px); z-index: 100; transition: 0.5s; border-right: 1px solid rgba(56, 189, 248, 0.3); padding: 40px 20px; }
        #sidebar.active { left: 0; }
        .nav-glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 24px; background: #000; border: 1px solid rgba(56, 189, 248, 0.4); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .card-video { background: rgba(30, 41, 59, 0.3); backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .profile-box { background: linear-gradient(135deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.9) 100%); border: 1px solid rgba(56, 189, 248, 0.2); position: relative; overflow: hidden; }
    </style>
</head>
<body>

    <div class="shape-1"></div>
    <div class="shape-2"></div>

    <div id="sidebar">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-sky-400 font-black italic uppercase">Menu</h2>
            <button onclick="toggleMenu()" class="text-slate-400">✕</button>
        </div>
        <nav class="space-y-8">
            <a href="#" class="block text-sky-400 font-bold">BERANDA</a>
            <div class="text-slate-600 font-bold">PROGRAM TV 🔒</div>
            <div class="text-slate-600 font-bold">JADWAL 🔒</div>
        </nav>
    </div>

    <nav class="p-4 nav-glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logoihya7tv.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/717/717426.png'" class="h-10 w-10 rounded-xl">
                <h1 class="text-xl font-black text-sky-400 italic">IHYA' 7 TV</h1>
            </div>
            <button onclick="toggleMenu()" class="p-2 border border-sky-500/30 rounded-full">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8">
        
        <section class="mb-10">
            <h2 class="text-[10px] font-black mb-4 tracking-[0.4em] text-slate-500 uppercase italic text-center">Jadwal Mendatang</h2>
            <div class="swiper mySwiper rounded-3xl overflow-hidden border border-sky-500/30">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <img src="thumbnail1.jpg" class="w-full aspect-video object-cover" onerror="this.src='https://via.placeholder.com/1280x720/020617/38bdf8?text=JADWAL+1'">
                    </div>
                    <div class="swiper-slide">
                        <img src="thumbnail2.jpg" class="w-full aspect-video object-cover" onerror="this.src='https://via.placeholder.com/1280x720/020617/38bdf8?text=JADWAL+2'">
                    </div>
                    <div class="swiper-slide">
                        <img src="thumbnail3.jpg" class="w-full aspect-video object-cover" onerror="this.src='https://via.placeholder.com/1280x720/020617/38bdf8?text=JADWAL+3'">
                    </div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
        </section>

        <section class="mb-14 text-center">
            <div class="flex items-center justify-center gap-4 mb-8">
                <div class="h-px flex-grow bg-gradient-to-r from-transparent to-sky-500/50"></div>
                <h2 class="live-label uppercase italic">LIVE STREAMING</h2>
                <div class="h-px flex-grow bg-gradient-to-l from-transparent to-sky-500/50"></div>
            </div>
            <div class="video-container">
                <iframe id="live-player" src="https://www.youtube.com/embed/live_stream?channel=UC2TptaJdg05H5zrIyffgPiQ" allowfullscreen allow="autoplay"></iframe>
            </div>
        </section>

        <section class="mb-20 text-center">
            <h2 class="text-[10px] font-black mb-8 tracking-[0.4em] text-slate-500 uppercase italic">Arsip Siaran Terbaru</h2>
            <div id="video-list" class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <p id="loading-msg" class="col-span-full py-10 text-[9px] uppercase animate-pulse">Menghubungkan ke Server...</p>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const CHANNEL_ID = 'UC2TptaJdg05H5zrIyffgPiQ';

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // SWIPER INIT
        new Swiper(".mySwiper", {
            loop: true,
            autoplay: { delay: 3000 },
            pagination: { el: ".swiper-pagination", clickable: true },
            effect: "fade"
        });

        // FETCH DATA TANPA API KEY (DENGAN PENANGANAN ERROR)
        async function fetchVideos() {
            const list = document.getElementById('video-list');
            const loading = document.getElementById('loading-msg');
            
            try {
                // Menggunakan rss2json dengan cache buster
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}&t=${Date.now()}`);
                const data = await response.json();

                if (data.status === 'ok') {
                    loading.style.display = 'none';
                    list.innerHTML = ''; 

                    data.items.forEach(item => {
                        // Filter Shorts Sederhana (Jika link tidak mengandung ID video yang benar, skip)
                        const vId = item.link.split('v=')[1]?.split('&')[0];
                        if (!vId) return;

                        const card = document.createElement('div');
                        card.className = 'card-video rounded-2xl overflow-hidden cursor-pointer p-1';
                        card.onclick = () => {
                            window.scrollTo({top: 400, behavior: 'smooth'});
                            document.getElementById('live-player').src = `https://www.youtube.com/embed/${vId}?autoplay=1`;
                        };
                        card.innerHTML = `
                            <img src="${item.thumbnail}" class="w-full aspect-video object-cover rounded-xl">
                            <div class="p-2">
                                <h3 class="text-[9px] font-bold text-slate-400 line-clamp-2 uppercase italic">${item.title}</h3>
                            </div>
                        `;
                        list.appendChild(card);
                    });
                } else {
                    throw new Error("RSS Error");
                }
            } catch (err) {
                console.error(err);
                loading.innerText = "Gagal memuat arsip. Refresh halaman.";
            }
        }

        window.onload = fetchVideos;
    </script>
</body>
    </html>
