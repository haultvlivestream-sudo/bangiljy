<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHYA' 7 TV - Media Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; overflow-x: hidden; }
        
        /* Shape Cahaya di Latar Belakang */
        .shape-1 {
            position: fixed; top: -10%; left: -10%; width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(2, 6, 23, 0) 70%);
            border-radius: 50%; z-index: -1; animation: float 20s infinite alternate;
        }
        .shape-2 {
            position: fixed; bottom: -10%; right: -10%; width: 35vw; height: 35vw;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.1) 0%, rgba(2, 6, 23, 0) 70%);
            border-radius: 50%; z-index: -1; animation: float 15s infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        .nav-glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-container { 
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; 
            border-radius: 24px; background: #000; border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.1);
        }

        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .card-video {
            background: rgba(30, 41, 59, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-video:hover {
            transform: scale(1.05);
            border-color: rgba(56, 189, 248, 0.5);
            background: rgba(30, 41, 59, 0.6);
        }

        .profile-box {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.6) 0%, rgba(15, 23, 42, 0.8) 100%);
            border: 1px solid rgba(56, 189, 248, 0.2);
            position: relative; overflow: hidden;
        }

        /* Garis cahaya berjalan di profile box */
        .profile-box::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(56, 189, 248, 0.05), transparent);
            transform: rotate(45deg); animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .social-btn { 
            transition: all 0.3s ease; background: rgba(56, 189, 248, 0.1);
            padding: 12px; border-radius: 16px; border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .social-btn:hover { background: #38bdf8; transform: translateY(-5px); box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        .social-btn img { filter: invert(1); width: 20px; height: 20px; }
    </style>
</head>
<body class="font-sans">

    <div class="shape-1"></div>
    <div class="shape-2"></div>

    <nav class="p-4 nav-glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logoihya7tv.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/717/717426.png'" class="h-10 w-10 object-contain rounded-xl">
                <h1 class="text-xl font-black tracking-tighter text-sky-400 uppercase leading-none">IHYA' 7 TV</h1>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse shadow-[0_0_10px_#ef4444]"></div>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live Now</span>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8">
        
        <section class="mb-10 profile-box p-6 rounded-3xl shadow-2xl relative">
            <p class="text-[11px] md:text-sm text-slate-300 leading-relaxed font-medium relative z-10">
                <strong class="text-sky-400 italic uppercase">IHYA' 7 TV</strong> ADALAH TELEVISI ISLAM AHLUSSUNAH WAL JAMA'AH YANG MENAMPILKAN LIVE STREAMING DI CHANNEL YOUTUBE, INSTAGRAM, TIKTOK, DLL BERISI TENTANG LIVE HAUL, MAULID, KAJIAN, DLL. <br class="hidden md:block">
                <span class="text-sky-500 font-black mt-2 inline-block border-b-2 border-sky-900/50">EST. 1 RAMADHAN 1444 H</span>
            </p>
        </section>

        <section class="mb-14">
            <div class="video-container">
                <iframe id="live-player" src="https://www.youtube.com/embed/live_stream?channel=UC2TptaJdg05H5zrIyffgPiQ" allowfullscreen></iframe>
            </div>
        </section>

        <section class="mb-20">
            <div class="flex items-center gap-4 mb-8">
                <h2 class="text-xs font-black tracking-[0.3em] text-slate-500 uppercase">Latest Broadcasts</h2>
                <div class="h-px flex-grow bg-gradient-to-r from-sky-900/50 to-transparent"></div>
            </div>
            <div id="video-list" class="grid grid-cols-2 lg:grid-cols-5 gap-4">
                <p id="loading-msg" class="col-span-full text-center text-slate-600 py-10 text-[10px] uppercase tracking-widest italic">Syncing satellite...</p>
            </div>
        </section>

        <footer class="text-center border-t border-white/5 pt-16 pb-20">
            <div class="flex justify-center gap-6 mb-10">
                <a href="https://www.youtube.com/@IHYA7TV" target="_blank" class="social-btn"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
                <a href="https://www.instagram.com/ihya7tv?igsh=MTYwNDZpaGxkNnlscA==" target="_blank" class="social-btn"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png"></a>
                <a href="https://vm.tiktok.com/ZS9N299oN48LS-LBapA/" target="_blank" class="social-btn"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>
            </div>
            <p class="text-slate-600 text-[10px] font-black uppercase tracking-[0.6em]">MULTIMEDIA IHYA' 7 TV &copy; 2026</p>
        </footer>
    </main>

    <script>
        const CHANNEL_ID = 'UC2TptaJdg05H5zrIyffgPiQ';
        async function fetchArchive() {
            const list = document.getElementById('video-list');
            const loading = document.getElementById('loading-msg');
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}&count=10`);
                const data = await res.json();
                if (data.status === 'ok') {
                    loading.style.display = 'none';
                    data.items.forEach(item => {
                        const vId = item.link.split('v=')[1];
                        list.innerHTML += `
                            <div class="card-video rounded-2xl overflow-hidden cursor-pointer group p-1" onclick="window.scrollTo({top:0, behavior:'smooth'}); document.getElementById('live-player').src='https://www.youtube.com/embed/${vId}?autoplay=1'">
                                <div class="relative overflow-hidden rounded-xl aspect-video">
                                    <img src="${item.thumbnail}" class="w-full h-full object-cover">
                                </div>
                                <div class="p-2">
                                    <h3 class="text-[9px] font-bold line-clamp-2 text-slate-400 group-hover:text-sky-300 transition-colors">${item.title}</h3>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) { loading.innerText = "Connection lost."; }
        }
        fetchArchive();
    </script>
</body>
    </html>
