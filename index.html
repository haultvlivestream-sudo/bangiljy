<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHYA' 7 TV - Live Streaming Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }
    </style>
</head>
<body class="bg-black text-white font-sans selection:bg-red-600">

    <header class="p-4 sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-zinc-800 flex justify-between items-center">
        <h1 class="text-2xl font-black text-red-600 italic">IHYA' 7 TV</h1>
        <div class="flex items-center gap-2">
            <div id="live-dot" class="w-2 h-2 bg-zinc-600 rounded-full"></div>
            <span id="status-text" class="text-[10px] uppercase font-bold text-zinc-500 tracking-widest">Checking Sync</span>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-6xl">
        
        <section class="mb-12">
            <div class="relative w-full overflow-hidden rounded-2xl bg-zinc-900 border border-zinc-800 shadow-[0_0_50px_rgba(255,0,0,0.1)]" style="padding-top: 56.25%;">
                <iframe 
                    id="main-frame"
                    class="absolute top-0 left-0 w-full h-full"
                    src="https://www.youtube.com/embed/live_stream?channel=UC2TptaJdg05H5zrIyffgPiQ&autoplay=1" 
                    frameborder="0" 
                    allowfullscreen>
                </iframe>
            </div>
        </section>

        <section>
            <div class="flex items-baseline gap-3 mb-6">
                <h2 class="text-xl font-bold italic uppercase">Daftar Siaran</h2>
                <span class="text-zinc-600 text-xs font-mono">Top 50 Recent</span>
            </div>

            <div id="video-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <div class="animate-pulse bg-zinc-900 h-40 rounded-xl"></div>
                <div class="animate-pulse bg-zinc-900 h-40 rounded-xl"></div>
            </div>
        </section>
    </main>

    <script>
        const CHANNEL_ID = 'UC2TptaJdg05H5zrIyffgPiQ';
        const videoList = document.getElementById('video-list');
        const statusText = document.getElementById('status-text');
        const liveDot = document.getElementById('live-dot');

        async function updateContent() {
            try {
                // Mengambil 50 video terbaru via RSS to JSON
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}&api_key=oypsmx6mq8f0v4lzp8m2bexw8c7zjw5fxtv1a1n0&count=50`);
                const data = await res.json();

                if (data.items && data.items.length > 0) {
                    videoList.innerHTML = '';
                    
                    data.items.forEach((item) => {
                        const vId = item.link.split('v=')[1];
                        const card = `
                            <div onclick="playThis('${vId}')" class="group cursor-pointer bg-zinc-900/50 border border-zinc-800 rounded-xl overflow-hidden hover:border-red-600 transition-all duration-300">
                                <div class="relative aspect-video">
                                    <img src="${item.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                                    <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent"></div>
                                </div>
                                <div class="p-3">
                                    <h3 class="text-[11px] font-semibold line-clamp-2 leading-relaxed text-zinc-200">${item.title}</h3>
                                    <p class="text-[9px] text-zinc-600 mt-2 font-mono uppercase">${new Date(item.pubDate).toLocaleDateString('id-ID')}</p>
                                </div>
                            </div>
                        `;
                        videoList.innerHTML += card;
                    });

                    statusText.innerText = "System Synced";
                    statusText.classList.replace('text-zinc-500', 'text-green-500');
                    liveDot.classList.replace('bg-zinc-600', 'bg-green-500');
                }
            } catch (e) {
                console.error("Sync Error", e);
                statusText.innerText = "Sync Failed";
            }
        }

        function playThis(id) {
            document.getElementById('main-frame').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Jalankan saat load
        updateContent();

        // Refresh otomatis setiap 10 menit (600000 ms) agar jadwal baru langsung masuk
        setInterval(updateContent, 600000);
    </script>

    <footer class="p-10 text-center text-zinc-800 text-[10px] font-bold tracking-[0.2em] uppercase">
        IHYA' 7 TV &bull; Digital Broadcasting System
    </footer>
</body>
</html>
