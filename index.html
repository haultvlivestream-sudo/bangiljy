<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHYA7TV - Fast Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background: #111; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body class="font-sans">

    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-black">
        <h1 class="text-xl font-bold text-red-600 italic">IHYA7TV</h1>
        <span class="text-[9px] text-zinc-500 uppercase tracking-widest">Live System v2</span>
    </header>

    <main class="p-4 max-w-5xl mx-auto">
        <div class="mb-8">
            <div class="flex items-center gap-2 mb-2 text-xs font-bold text-zinc-400 uppercase">
                <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span> Siaran Langsung
            </div>
            <div class="video-wrapper shadow-lg shadow-red-900/10">
                <iframe 
                    src="https://www.youtube.com/embed/live_stream?channel=UC2TptaJdg05H5zrIyffgPiQ" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <h2 class="text-sm font-bold mb-4 text-zinc-400 uppercase tracking-tight">Arsip Terbaru (Top 40)</h2>
        <div id="video-list" class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <p id="loading" class="text-xs text-zinc-600 col-span-full text-center py-10">Memuat video...</p>
        </div>
    </main>

    <script>
        const CHANNEL_ID = 'UC2TptaJdg05H5zrIyffgPiQ';
        
        async function loadVideos() {
            try {
                // Mengambil data 40 video terbaru (lebih ringan dari 50)
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`);
                const data = await res.json();
                
                const list = document.getElementById('video-list');
                const loading = document.getElementById('loading');
                
                if (data.items) {
                    loading.style.display = 'none';
                    data.items.forEach(item => {
                        const vId = item.link.split('v=')[1];
                        list.innerHTML += `
                            <div class="cursor-pointer group" onclick="location.href='#'; document.querySelector('iframe').src='https://www.youtube.com/embed/${vId}?autoplay=1'">
                                <div class="relative overflow-hidden rounded-lg bg-zinc-900 aspect-video">
                                    <img src="${item.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform">
                                </div>
                                <h3 class="text-[10px] mt-2 line-clamp-2 text-zinc-300 font-medium group-hover:text-red-500">${item.title}</h3>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                document.getElementById('loading').innerText = "Gagal memuat video.";
            }
        }
        loadVideos();
    </script>

</body>
    </html>
