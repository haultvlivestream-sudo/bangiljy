<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHYA' 7 TV - Media Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Warna Dasar Biru Dongker */
        body { background-color: #020617; color: #f8fafc; }
        
        .navy-gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            border-radius: 20px; 
            background: #0f172a; 
            border: 1px solid #1e293b;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.1);
        }

        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .card-video {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(30, 41, 59, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-video:hover {
            border-color: #38bdf8;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
            background: rgba(30, 41, 59, 0.8);
        }

        .social-btn { 
            transition: all 0.3s ease; 
            background: rgba(30, 41, 59, 0.5);
            padding: 10px;
            border-radius: 50%;
            border: 1px solid #1e293b;
        }

        .social-btn:hover { 
            background: #38bdf8;
            transform: rotate(10deg);
        }

        .social-btn img { filter: invert(1); width: 20px; height: 20px; }
    </style>
</head>
<body class="font-sans selection:bg-sky-500">

    <nav class="p-5 border-b border-slate-800 bg-slate-950/80 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="logoihya7tv.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/717/717426.png'" class="h-12 w-12 object-contain rounded-xl shadow-lg">
                <div>
                    <h1 class="text-2xl font-black tracking-tighter navy-gradient-text uppercase leading-none">IHYA' 7 TV</h1>
                    <p class="text-[8px] text-slate-500 uppercase tracking-[0.4em] mt-1">Multimedia Hub</p>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-2">
                <span class="w-2 h-2 bg-sky-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Network Online</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-10">
        
        <section class="mb-16">
            <div class="video-container">
                <iframe id="live-player" src="https://www.youtube.com/embed/live_stream?channel=UC2TptaJdg05H5zrIyffgPiQ" allowfullscreen></iframe>
            </div>
        </section>

        <section class="mb-24">
            <div class="flex items-center justify-between mb-10">
                <h2 class="text-lg font-bold flex items-center gap-3">
                    <span class="h-6 w-1 bg-sky-500 rounded-full"></span> 
                    <span class="tracking-tight italic uppercase text-slate-300">Arsip Siaran Terbaru</span>
                </h2>
                <div class="h-px flex-grow mx-6 bg-slate-800 hidden sm:block"></div>
            </div>
            
            <div id="video-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <p id="loading-msg" class="col-span-full text-center text-slate-600 py-20 text-xs font-mono uppercase tracking-[0.3em]">Mengkoneksikan ke Satelit...</p>
            </div>
        </section>

        <footer class="text-center border-t border-slate-900 pt-16 pb-24">
            <div class="flex justify-center gap-6 mb-12">
                <a href="https://www.youtube.com/@IHYA7TV" target="_blank" class="social-btn">
                    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
                </a>
                <a href="https://www.instagram.com/ihya7tv?igsh=MTYwNDZpaGxkNnlscA==" target="_blank" class="social-btn">
                    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png">
                </a>
                <a href="https://vm.tiktok.com/ZS9N299oN48LS-LBapA/" target="_blank" class="social-btn">
                    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
                </a>
            </div>

            <div class="space-y-3">
                <p class="text-slate-500 text-[11px] font-bold uppercase tracking-[0.5em]">TIM MULTIMEDIA IHYA' 7 TV &copy; 2026</p>
                <div class="flex justify-center gap-2">
                    <span class="w-1 h-1 bg-slate-800 rounded-full"></span>
                    <span class="w-1 h-1 bg-slate-800 rounded-full"></span>
                    <span class="w-1 h-1 bg-slate-800 rounded-full"></span>
                </div>
            </div>
        </footer>
    </main>

    <script>
        const CHANNEL_ID = 'UC2TptaJdg05H5zrIyffgPiQ';
        
        async function fetchArchive() {
            const list = document.getElementById('video-list');
            const loading = document.getElementById('loading-msg');
            
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`);
                const data = await res.json();
                
                if (data.status === 'ok') {
                    loading.style.display = 'none';
                    data.items.forEach(item => {
                        const vId = item.link.split('v=')[1];
                        list.innerHTML += `
                            <div class="card-video rounded-2xl overflow-hidden cursor-pointer group shadow-xl" onclick="window.scrollTo({top:0, behavior:'smooth'}); document.getElementById('live-player').src='https://www.youtube.com/embed/${vId}?autoplay=1'">
                                <div class="relative aspect-video overflow-hidden">
                                    <img src="${item.thumbnail}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                                    <div class="absolute inset-0 bg-slate-950/20 group-hover:bg-transparent transition-colors"></div>
                                </div>
                                <div class="p-5">
                                    <h3 class="text-xs font-bold line-clamp-2 leading-relaxed text-slate-300 group-hover:text-sky-400 transition-colors">${item.title}</h3>
                                    <div class="flex items-center gap-2 mt-4">
                                        <span class="text-[9px] bg-slate-800 text-slate-400 px-2 py-1 rounded-md font-bold uppercase tracking-tighter">Archive</span>
                                        <span class="text-[9px] text-slate-600 font-medium">${new Date(item.pubDate).toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                loading.innerText = "Koneksi satelit terputus. Silakan muat ulang.";
            }
        }
        fetchArchive();
    </script>
</body>
</html>
